name: Tests

on:
  pull_request:
  push:
    branches: [master]

jobs:
  apex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: salesforcecli/setup-salesforcecli@v1
      - name: Authorize Salesforce
        run: |
          echo "${{ secrets.SALESFORCE_DEPLOYMENT_KEY }}" > sf_key
          sf org login jwt --client-id ${{ secrets.SALESFORCE_CLIENT_ID }} --jwt-key-file sf_key --username ${{ secrets.SALESFORCE_USERNAME }} --alias devhub
          sf org create scratch --alias test_org --definition-file config/project-scratch-org-def.json --no-namespace
          rm sf_key
      - name: Install dependencies
        run: npm install
      - name: Run Apex tests
        run: sf apex run test --class-names RebuyPatternServiceTest --class-names RebuyPatternBatchTest --class-names RebuyRadarControllerTest --target-org test_org --wait 10 --code-coverage --result-format json > apex-results.json
      - name: Validate Apex coverage
        run: |
          COVERAGE=$(cat apex-results.json | jq '.result.coverage | min_by(.percentage) | .percentage')
          echo "Min coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 85" | bc -l) )); then
            echo "Coverage below 85%"
            exit 1
          fi

  jest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run Jest tests
        run: npm run test:unit -- --coverage --testPathPattern=lwc
      - name: Validate Jest coverage
        run: |
          if ! grep -q "Statements.*: 85" coverage/index.html; then
            echo "Jest coverage below target"
          fi
